<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DigiSecure — Secure Document Transfer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0c0f;
    --surface:  #10141a;
    --border:   #1e2530;
    --accent:   #00d4aa;
    --accent2:  #0088ff;
    --danger:   #ff4455;
    --warn:     #ffaa00;
    --text:     #c8d4e0;
    --muted:    #4a5568;
    --mono:     'Space Mono', monospace;
    --sans:     'Syne', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  /* Animated grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,170,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,170,.04) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridScroll 20s linear infinite;
    pointer-events: none;
  }
  @keyframes gridScroll {
    from { background-position: 0 0; }
    to   { background-position: 40px 40px; }
  }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 460px;
    padding: 1rem;
    animation: fadeUp .5s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo {
    text-align: center;
    margin-bottom: 2.5rem;
  }
  .logo-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 56px; height: 56px;
    border: 2px solid var(--accent);
    border-radius: 12px;
    margin-bottom: 1rem;
    position: relative;
  }
  .logo-icon::after {
    content: '🔐';
    font-size: 24px;
  }
  .logo-icon::before {
    content: '';
    position: absolute;
    inset: -4px;
    border: 1px solid rgba(0,212,170,.2);
    border-radius: 16px;
    animation: pulse 2s ease infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: .4; transform: scale(1.05); }
  }
  .logo h1 {
    font-family: var(--sans);
    font-size: 1.75rem;
    font-weight: 800;
    letter-spacing: -.02em;
    color: #fff;
  }
  .logo h1 span { color: var(--accent); }
  .logo p {
    font-family: var(--mono);
    font-size: .65rem;
    color: var(--muted);
    margin-top: .35rem;
    letter-spacing: .12em;
    text-transform: uppercase;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    flex: 1;
    padding: .875rem 1rem;
    background: none;
    border: none;
    color: var(--muted);
    font-family: var(--mono);
    font-size: .8rem;
    letter-spacing: .08em;
    cursor: pointer;
    transition: color .2s, background .2s;
  }
  .tab-btn.active {
    color: var(--accent);
    background: rgba(0,212,170,.06);
    border-bottom: 2px solid var(--accent);
    margin-bottom: -1px;
  }
  .tab-btn:hover:not(.active) { color: var(--text); }

  .tab-panel { display: none; padding: 1.75rem; }
  .tab-panel.active { display: block; }

  .form-group { margin-bottom: 1.1rem; }
  label {
    display: block;
    font-family: var(--mono);
    font-size: .7rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: .45rem;
  }
  input[type=text], input[type=email], input[type=password] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: .85rem;
    padding: .7rem 1rem;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,212,170,.12);
  }

  .btn {
    width: 100%;
    padding: .85rem 1.25rem;
    border: none;
    border-radius: 8px;
    font-family: var(--mono);
    font-size: .82rem;
    font-weight: 700;
    letter-spacing: .06em;
    cursor: pointer;
    transition: all .2s;
    margin-top: .5rem;
  }
  .btn-primary {
    background: var(--accent);
    color: #000;
  }
  .btn-primary:hover { background: #00f5c4; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,212,170,.3); }
  .btn-primary:active { transform: none; }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }

  .alert {
    padding: .75rem 1rem;
    border-radius: 8px;
    font-family: var(--mono);
    font-size: .75rem;
    margin-bottom: 1rem;
    display: none;
    line-height: 1.5;
  }
  .alert.show { display: block; }
  .alert-error   { background: rgba(255,68,85,.1);  border: 1px solid rgba(255,68,85,.3);  color: #ff8899; }
  .alert-success { background: rgba(0,212,170,.1);  border: 1px solid rgba(0,212,170,.3);  color: #00d4aa; }

  .badge-row {
    display: flex;
    gap: .5rem;
    margin-top: 2rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  .badge {
    font-family: var(--mono);
    font-size: .6rem;
    letter-spacing: .08em;
    padding: .3rem .65rem;
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--muted);
  }

  .spinner {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid rgba(0,0,0,.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="wrapper">
  <div class="logo">
    <div class="logo-icon"></div>
    <h1>Digi<span>Secure</span></h1>
    <p>AES-256 · RSA-2048 · X.509 · End-to-End</p>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" onclick="switchTab('register')">Register</button>
    </div>

    <!-- LOGIN -->
    <div class="tab-panel active" id="panel-login">
      <div class="alert" id="login-alert"></div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="login-user" placeholder="your_username" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn btn-primary" id="login-btn" onclick="doLogin()">Login →</button>
    </div>

    <!-- REGISTER -->
    <div class="tab-panel" id="panel-register">
      <div class="alert" id="reg-alert"></div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="reg-user" placeholder="your_username" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-pass" placeholder="Min. 6 characters" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="reg-confirm" placeholder="Repeat password" autocomplete="new-password">
      </div>
      <button class="btn btn-primary" id="reg-btn" onclick="doRegister()">
        Create Account + Generate X.509 Cert
      </button>
    </div>
  </div>

  <div class="badge-row">
    <span class="badge">AES-256-CBC</span>
    <span class="badge">RSA-OAEP</span>
    <span class="badge">X.509 Certs</span>
    <span class="badge">MD5 Integrity</span>
    <span class="badge">Digital Signatures</span>
  </div>
</div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) =>
    b.classList.toggle('active', (i===0) === (tab==='login'))
  );
  document.getElementById('panel-login').classList.toggle('active', tab==='login');
  document.getElementById('panel-register').classList.toggle('active', tab==='register');
}

function showAlert(id, msg, type='error') {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = `alert show alert-${type}`;
}
function clearAlert(id) {
  const el = document.getElementById(id);
  el.className = 'alert';
}

async function doLogin() {
  clearAlert('login-alert');
  const btn = document.getElementById('login-btn');
  const username = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value;
  if (!username || !password) { showAlert('login-alert','Please fill in all fields.'); return; }
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Authenticating…';
  try {
    const r = await fetch('/api/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username, password})
    });
    const d = await r.json();
    if (d.success) { window.location = '/dashboard'; }
    else { showAlert('login-alert', d.error || 'Login failed.'); }
  } catch(e) { showAlert('login-alert','Network error. Please try again.'); }
  finally { btn.disabled=false; btn.textContent='Login →'; }
}

async function doRegister() {
  clearAlert('reg-alert');
  const btn = document.getElementById('reg-btn');
  const username = document.getElementById('reg-user').value.trim();
  const email    = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-pass').value;
  const confirm  = document.getElementById('reg-confirm').value;
  if (!username || !email || !password || !confirm) {
    showAlert('reg-alert','Please fill in all fields.'); return;
  }
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Generating RSA keys + X.509 cert…';
  try {
    const r = await fetch('/api/register', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username, email, password, confirm})
    });
    const d = await r.json();
    if (d.success) {
      showAlert('reg-alert', d.message, 'success');
      setTimeout(() => switchTab('login'), 2000);
    } else { showAlert('reg-alert', d.error || 'Registration failed.'); }
  } catch(e) { showAlert('reg-alert','Network error. Please try again.'); }
  finally { btn.disabled=false; btn.textContent='Create Account + Generate X.509 Cert'; }
}

// Enter key shortcuts
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (document.getElementById('panel-login').classList.contains('active')) doLogin();
  else doRegister();
});

// Auto-redirect if already logged in
fetch('/api/me').then(r=>r.json()).then(d=>{ if(d.logged_in) window.location='/dashboard'; });
</script>
</body>
</html>
